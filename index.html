<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cursed Colors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card" id="mainCard">
    
    <div id="screenStart" class="screen active">
      <h1 class="title">cursed colors</h1>
      <p class="subtitle">Humans can't reliably recall colors. This is a simple game to see how good (or bad) you are at it.<br><br>We'll show you five colors, then you'll try and recreate them.</p>
      
      <div class="controls">
          <div class="toggle-box">
              <input type="radio" id="easy" name="diff" value="easy" checked>
              <label for="easy">Easy</label>
              
              <input type="radio" id="hard" name="diff" value="hard">
              <label for="hard">Hard</label>
          </div>
        <button id="startBtn">Start</button>
      </div>
    </div>

    <div id="screenMemorize" class="screen">
      <div id="roundIndMem">1/5</div>
        <div class="timer-area">
          <div id="countdown">5</div>
          <div class="timer-label">Seconds to remember</div>
        </div>
    </div>

    <div id="screenGuess" class="screen">
      <div class="guess-layout">
        <div class="strip-container">
          <div class="strip" id="hueStrip">
            <div class="strip-dot" id="hueDot"></div>
          </div>
          <div class="strip" id="satBriStrip">
            <div class="strip-dot" id="satBriDot"></div>
          </div>
        </div>
        <div class="preview-area" id="livePreview">
          <div id="roundIndGuess">1/5</div>
          <button id="submitGuessBtn"></button>
        </div>
      </div>
    </div>

    <div id="screenRoundResult" class="screen p-0">
      <div class="split-view">
        <div class="half" id="targetHalf">
          <div class="half-label">TARGET</div>
        </div>
        <div class="half" id="guessHalf">
          <div class="half-label">YOUR GUESS</div>
        </div>
      </div>
      <div class="flash-score" id="flashScore">0%</div>
    </div>

    <div id="screenEnd" class="screen">
      <div class="end-header">
        <h2 id="finalScoreText">0%</h2>
        <p id="flavorText">Cursed</p>
      </div>
      <div id="summaryGrid"></div>
      <button id="playAgainBtn">Play Again</button>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
